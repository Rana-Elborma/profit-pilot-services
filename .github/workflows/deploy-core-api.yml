name: Deploy core-api

on:
  push:
    branches: [main]
    paths:
      - 'core-api/**'
      - '.github/workflows/deploy-core-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push image to Artifact Registry
        env:
          IMAGE: ${{ secrets.ARTIFACT_REGISTRY }}/core-api:${{ github.sha }}
        run: |
          docker build -t $IMAGE ./core-api
          docker push $IMAGE

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ secrets.ARTIFACT_REGISTRY }}/core-api:${{ github.sha }}
        run: |
          gcloud run deploy core-api \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ secrets.WIF_SERVICE_ACCOUNT }} \
            --set-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest