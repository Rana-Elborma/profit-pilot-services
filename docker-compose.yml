services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: profitpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-api:
    build: ./core-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/profitpilot
      JWT_SECRET: local-dev-secret-not-for-production
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy

  analytics-api:
    build: ./analytics-api
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/profitpilot
      JWT_SECRET: local-dev-secret-not-for-production
      PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy
