services:
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud emulators firestore start --host-port=0.0.0.0:8080 --project=profit-pilot-local
    ports:
      - "8080:8080"

  core-api:
    build: ./core-api
    ports:
      - "8000:8000"
    environment:
      FIRESTORE_EMULATOR_HOST: "firestore-emulator:8080"
      GCP_PROJECT_ID: "profit-pilot-local"
      JWT_SECRET: local-dev-secret-not-for-production
      PORT: 8000
    depends_on:
      - firestore-emulator

  analytics-api:
    build: ./analytics-api
    ports:
      - "8001:8001"
    environment:
      FIRESTORE_EMULATOR_HOST: "firestore-emulator:8080"
      GCP_PROJECT_ID: "profit-pilot-local"
      JWT_SECRET: local-dev-secret-not-for-production
      PORT: 8001
    depends_on:
      - firestore-emulator
